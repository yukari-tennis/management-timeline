<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <title>Management Timeline</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container-fluid p-4">
    <h2 class="mb-4">
        📖 Management Timeline
    </h2>

    <div class="card mb-3">
        <div class="card-body">

            <div class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">カテゴリ</label>
                    <select id="category" class="form-select">
                        <option value="">すべて</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">人物</label>
                    <select id="person" class="form-select">
                        <option value="">すべて</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">開始年</label>
                    <input
                        id="year_from"
                        type="number"
                        class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label">終了年</label>
                    <input
                        id="year_to"
                        type="number"
                        class="form-control">
                </div>
                <div class="col-md-2 d-grid">
                    <label>&nbsp;</label>
                    <button
                        id="search"
                        class="btn btn-primary">

                        <i class="bi bi-search"></i>
                        検索
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="d-flex justify-content-between mb-3">
    <h5>年表一覧</h5>
    <button
        class="btn btn-success"
        onclick="location.href='event.html'">

        <i class="bi bi-plus-circle"></i>
        新規登録

    </button>
</div>

<table class="table table-striped table-hover align-middle">
    <thead class="table-dark">
    <tr>
        <th width="80">年</th>
        <th>タイトル</th>
        <th width="180">人物</th>
        <th width="120">カテゴリ</th>
        <th width="220">著書・論文</th>
        <th width="90">操作</th>
    </tr>
    </thead>
    <tbody id="eventTable">
    </tbody>
</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/config.js"></script>
<script src="js/index.js"></script>

</body>
</html>
